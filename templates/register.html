<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#08152d,#0f4c81);

    .card{
        background:white;

    h1{
        text-align:center;
        color:#08152d;
        margin-bottom:10px;

    }

    input{
        width:100%;
        padding:12px;
        margin-bottom:15px;
        border:1px solid #ddd;

    }

    button{
        width:100%;
        padding:12px;
        background:#08152d;
        color:white;
        border:none;
        border-radius:8px;

    }

    button:hover{
        background:#0f4c81;
    }

    .link{
        text-align:center;
        margin-top:20px;
    }

    .link a{
        text-decoration:none;
        color:#0f4c81;
        font-weight:bold;
    }
</style>
