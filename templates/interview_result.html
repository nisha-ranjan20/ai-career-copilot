<!DOCTYPE html>
<html>
<head>
<title>Interview Questions</title>

<style>

body{
    background:#f4f6fb;
    font-family:Arial;
}

.card{
    max-width:1000px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px lightgray;
}

.btn{
    background:#08152d;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    text-decoration:none;
    @media (max-width: 768px){

    .navbar{
        flex-direction:column;
        gap:15px;
        padding:15px;
        text-align:center;
    }

    .nav-right{
        flex-wrap:wrap;
        justify-content:center;
    }

    .container{
        width:100%;
        padding:10px;
    }

    .stats{
        flex-direction:column;
    }

    .stat-card{
        width:100%;
    }

    .welcome-card,
    .upload-card{
        padding:15px;
    }

    .profile-avatar{
        width:90px;
        height:90px;
    }

    textarea{
        height:120px;
    }

    button{
        width:100%;
    }
}
}

</style>

</head>

<body>

<div class="card">

<h1>🎤 Interview Questions</h1>

<div>
{{ questions|safe }}
</div>

<br>

<a href="/dashboard" class="btn">
← Back Dashboard
</a>

</div>

</body>
</html>
