<!DOCTYPE html>
<html>
<head>
    <title>Career AI Chat</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            padding:40px;
        }

        .card{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px lightgray;
        }
@media (max-width: 768px){

    .navbar{
        flex-direction:column;
        gap:15px;
        padding:15px;
        text-align:center;
    }

    .nav-right{
        flex-wrap:wrap;
        justify-content:center;
    }

    .container{
        width:100%;
        padding:10px;
    }

    .stats{
        flex-direction:column;
    }

    .stat-card{
        width:100%;
    }

    .welcome-card,
    .upload-card{
        padding:15px;
    }

    .profile-avatar{
        width:90px;
        height:90px;
    }

    textarea{
        height:120px;
    }

    button{
        width:100%;
    }
}
    </style>

</head>
<body>

<div class="card">

    <h2>🤖 Career AI</h2>

    <h3>Question:</h3>

    <p>{{ question }}</p>

    <h3>Answer:</h3>

    <p>{{ answer }}</p>

    <a href="/dashboard">
        Back
    </a>

</div>

</body>
</html>
